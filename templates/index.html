{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Productos</h2>

<table class="table table-dark table-hover text-center">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.nombre }}</td>
            <td>{{ p.categoria }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <a href="/editar/{{ p.id }}" class="btn btn-warning btn-sm">✏️</a>
                <a href="/eliminar/{{ p.id }}" class="btn btn-danger btn-sm">🗑</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
